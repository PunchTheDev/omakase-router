# Miner self-check — runs on every PR, no maintainer/VPS needed.
# Gate preflight is the required check; self-score on the PUBLIC dev split is
# advisory (the crown is decided by Punch's private gate rerun, not here).
name: self-check
on: pull_request
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: omakase-router }
      - uses: actions/checkout@v4
        with: { repository: PunchTheDev/omakase-eval, path: omakase-eval }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e omakase-eval
      - name: Gates 1-3 preflight (required)
        run: cd omakase-router && python scripts/check_submission.py
      - name: Self-score on the public dev split (advisory)
        run: cd omakase-router && bash scripts/self_score.sh || echo "::warning::self-score did not beat the incumbent on the public dev split"
